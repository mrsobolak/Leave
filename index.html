<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoOS</title>
<link rel="stylesheet" href="css/boot.css">
<link rel="stylesheet" href="css/login.css">
<link rel="stylesheet" href="css/desktop.css">
<link rel="stylesheet" href="css/apps.css">
<link rel="stylesheet" href="css/taskbar.css">
<link rel="stylesheet" href="css/windows.css">
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
<div id="dell-splash">
<div id="dell-logo">DELL</div>
<div id="dell-model">XPS 420</div>
<div id="dell-hint">Press F2 for Setup, F12 for Boot Menu</div>
</div>
<div id="bios" class="hidden">
<div id="bios-content"></div>
</div>
<div id="post" class="hidden">
<div id="post-content"></div>
</div>
<div id="boot-splash" class="hidden">
<div id="boot-logo">
<span id="boot-title">SoOS</span>
<span id="boot-sub">powered by linux</span>
<div id="boot-loader"><div id="boot-loader-bar"><span></span></div></div>
</div>
<div id="boot-copyright">Copyright (c) 2010 SoOS Project</div>
</div>
<div id="login-screen" class="hidden">
<div id="login-box">
<div id="login-avatar"></div>
<div id="login-fields">
<div id="login-username-display">TheDustBwlDuck</div>
<input type="password" id="login-pass" placeholder="password" autocomplete="off" spellcheck="false">
<button id="login-btn">log in</button>
<div id="login-error"></div>
</div>
</div>
</div>
<div id="desktop" class="hidden">
<div id="desktop-icons"></div>
<div id="windows-area"></div>
<div id="taskbar">
<button id="start-btn">
<span id="start-icon">&#9776;</span>
<span id="start-label">SoOS</span>
</button>
<div id="taskbar-apps"></div>
<div id="taskbar-tray">
<span id="tray-clock"></span>
</div>
</div>
<div id="start-menu" class="hidden">
<div id="start-menu-header">
<span id="start-menu-user"></span>
</div>
<div id="start-menu-apps"></div>
<div id="start-menu-footer">
<button id="start-shutdown">Shut Down</button>
</div>
</div>
</div>
<div id="shutdown-screen" class="hidden">
<span id="shutdown-text">Shutting down...</span>
</div>
<div id="jumpscare-overlay" class="hidden"></div>
<div id="scanlines"></div>
<div id="flicker"></div>
<script src="js/auth.js"></script>
<script src="js/boot.js"></script>
<script src="js/desktop.js"></script>
<script src="js/windows.js"></script>
<script src="js/apps.js"></script>
<script src="js/state.js"></script>
<script src="js/home.js"></script>
<script src="js/chatroom.js"></script>
<script src="js/main.js"></script>
</body>
</html>
